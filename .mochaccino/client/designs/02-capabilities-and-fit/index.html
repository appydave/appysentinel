<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AppySentinel — Capabilities & Fit</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@200..700&family=Roboto:ital,wght@0,100..900;1,100..900&family=Roboto+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-brown:        #342d2d;
      --brand-gold:         #ccba9d;
      --brand-yellow:       #ffde59;
      --brand-amber:        #c8841a;
      --brand-muted:        #7a6e5e;
      --brand-near-white:   #faf5ec;
      --brand-surface:      #f0ebe4;
      --brand-linen:        #e8e0d4;
      --brand-border:       #d4cdc4;
      --brand-chrome:       #1a1515;
      --brand-dark-surface: #25201e;

      --collect-color: #1a5fa0;
      --collect-bg:    #eaf2fc;
      --access-color:  #2a7a5a;
      --access-bg:     #e6f5ee;
      --deliver-color: #a05a1a;
      --deliver-bg:    #fdf0dc;

      --available-color: #2a7a5a;
      --available-bg:    #e6f5ee;
      --planned-color:   #7a6e5e;
      --planned-bg:      #f0ebe4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--brand-near-white);
      color: var(--brand-brown);
      line-height: 1.6;
    }

    .mocha-banner {
      background: var(--brand-chrome);
      color: var(--brand-gold);
      font-family: 'Roboto Mono', monospace;
      font-size: 11px;
      padding: 7px 32px;
      letter-spacing: 0.1em;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ── Header ── */
    .page-header {
      padding: 64px 0 48px;
      border-bottom: 2px solid var(--brand-linen);
    }

    .eyebrow {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--brand-amber);
      margin-bottom: 14px;
    }

    h1 {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: clamp(32px, 5vw, 52px);
      line-height: 1.0;
      text-transform: uppercase;
      color: var(--brand-brown);
      margin-bottom: 10px;
      letter-spacing: -0.01em;
    }

    .subtitle {
      font-size: 16px;
      color: var(--brand-muted);
      font-weight: 300;
      max-width: 660px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .intro-note {
      font-size: 13.5px;
      color: var(--brand-muted);
      line-height: 1.65;
      max-width: 660px;
      padding: 12px 16px;
      background: var(--brand-surface);
      border-left: 3px solid var(--brand-gold);
    }

    /* ── Status legend ── */
    .legend-row {
      display: flex;
      gap: 24px;
      padding: 20px 0;
      border-bottom: 1px solid var(--brand-linen);
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12.5px;
      color: var(--brand-muted);
    }

    .legend-pip {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-pip.available { background: var(--available-color); }
    .legend-pip.planned   { background: var(--brand-border); }

    /* ── Zone sections ── */
    .zone-section {
      margin-top: 40px;
      border: 1px solid var(--brand-linen);
    }

    .zone-header {
      display: grid;
      grid-template-columns: 5px 1fr;
      align-items: stretch;
    }

    .zone-stripe-collect { background: var(--collect-color); }
    .zone-stripe-access  { background: var(--access-color); }
    .zone-stripe-deliver { background: var(--deliver-color); }

    .zone-header-content {
      padding: 20px 24px;
    }

    .zone-header-collect { background: var(--collect-bg); }
    .zone-header-access  { background: var(--access-bg); }
    .zone-header-deliver { background: var(--deliver-bg); }

    .zone-name {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: 22px;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .collect .zone-name { color: var(--collect-color); }
    .access  .zone-name { color: var(--access-color); }
    .deliver .zone-name { color: var(--deliver-color); }

    .zone-question {
      font-family: 'Oswald', sans-serif;
      font-weight: 300;
      font-size: 16px;
      color: var(--brand-brown);
      margin-bottom: 6px;
    }

    .zone-intro {
      font-size: 13px;
      color: var(--brand-muted);
      line-height: 1.55;
    }

    /* ── Capability cards ── */
    .capabilities-list {
      padding: 0;
    }

    .cap-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
      padding: 18px 24px;
      border-top: 1px solid var(--brand-linen);
    }

    .cap-item:hover { background: var(--brand-surface); }

    .cap-name {
      font-family: 'Oswald', sans-serif;
      font-weight: 600;
      font-size: 16px;
      text-transform: uppercase;
      color: var(--brand-brown);
      margin-bottom: 5px;
      letter-spacing: 0.01em;
    }

    .cap-detail {
      font-size: 13px;
      color: var(--brand-muted);
      line-height: 1.6;
      max-width: 600px;
    }

    .cap-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    .status-badge {
      font-family: 'Roboto Mono', monospace;
      font-size: 9.5px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 9px;
      white-space: nowrap;
    }

    .status-badge.available {
      background: var(--available-bg);
      color: var(--available-color);
      border: 1px solid var(--available-color);
    }

    .status-badge.planned {
      background: var(--planned-bg);
      color: var(--planned-color);
      border: 1px solid var(--brand-border);
    }

    .pilot-tag {
      font-family: 'Roboto Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--brand-amber);
      background: #fdf0dc;
      padding: 2px 8px;
      white-space: nowrap;
    }

    /* ── Fit guide ── */
    .fit-section {
      margin-top: 48px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      background: var(--brand-linen);
    }

    .fit-col {
      background: var(--brand-near-white);
      padding: 32px 28px;
    }

    .fit-col-label {
      font-family: 'Oswald', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .fit-col.good .fit-col-label { color: var(--available-color); }
    .fit-col.not  .fit-col-label { color: var(--brand-muted); }

    .fit-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .fit-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--brand-brown);
    }

    .fit-icon {
      flex-shrink: 0;
      font-size: 14px;
      margin-top: 2px;
    }

    .fit-col.good .fit-icon { color: var(--available-color); }
    .fit-col.not  .fit-icon { color: var(--brand-border); }

    /* ── Footer ── */
    .page-footer {
      padding: 32px 0 44px;
      margin-top: 48px;
      border-top: 1px solid var(--brand-linen);
    }

    .footer-note {
      font-family: 'Roboto Mono', monospace;
      font-size: 10.5px;
      color: var(--brand-border);
      text-align: center;
      letter-spacing: 0.08em;
    }

    .footer-link {
      color: var(--brand-muted);
      text-decoration: none;
      border-bottom: 1px solid var(--brand-border);
      padding-bottom: 1px;
    }
    .footer-link:hover { color: var(--brand-brown); }

    .loading {
      text-align: center;
      padding: 120px 40px;
      font-family: 'Roboto Mono', monospace;
      font-size: 13px;
      color: var(--brand-muted);
    }

    @media (max-width: 680px) {
      .container { padding: 0 20px; }
      .fit-section { grid-template-columns: 1fr; }
      .cap-item { grid-template-columns: 1fr; }
      .cap-meta { align-items: flex-start; }
    }
  </style>
</head>
<body>

<!-- Mochaccino citation — data: client/data/02-capabilities-and-fit.json — source: documentation/data/03-pattern-capability-matrix.json + 04-recipe-catalog.json — rendered: 2026-04-28 -->
<div class="mocha-banner">Mocha — Capabilities & Fit — 2026-04-28</div>
<div id="app"><div class="loading">Loading…</div></div>

<script>
fetch('../../data/02-capabilities-and-fit.json')
  .then(r => r.json())
  .then(render)
  .catch(e => {
    document.getElementById('app').innerHTML =
      `<div class="loading">Could not load data: ${e.message}</div>`;
  });

const zoneClass = { Collect: 'collect', Access: 'access', Deliver: 'deliver' };

function renderZone(zone) {
  const cls = zoneClass[zone.name] || '';

  const caps = zone.capabilities.map(c => `
    <div class="cap-item">
      <div class="cap-body">
        <div class="cap-name">${c.name}</div>
        <div class="cap-detail">${c.detail}</div>
      </div>
      <div class="cap-meta">
        <div class="status-badge ${c.status}">${c.status === 'available' ? '● Available' : '○ Planned'}</div>
        ${c.pilot ? `<div class="pilot-tag">pilot: ${c.pilot}</div>` : ''}
      </div>
    </div>
  `).join('');

  return `
    <div class="zone-section ${cls}">
      <div class="zone-header">
        <div class="zone-stripe-${cls}"></div>
        <div class="zone-header-content zone-header-${cls}">
          <div class="zone-name">${zone.name}</div>
          <div class="zone-question">${zone.question}</div>
          <div class="zone-intro">${zone.intro}</div>
        </div>
      </div>
      <div class="capabilities-list">${caps}</div>
    </div>
  `;
}

function render(d) {
  const legend = d.status_legend.map(s => `
    <div class="legend-item">
      <div class="legend-pip ${s.code}"></div>
      <span><strong>${s.label}</strong> — ${s.detail}</span>
    </div>
  `).join('');

  const zones = d.zones.map(renderZone).join('');

  const goodItems = d.fit_guide.good.map(g => `
    <li class="fit-item"><span class="fit-icon">✓</span><span>${g}</span></li>
  `).join('');

  const notItems = d.fit_guide.not.map(n => `
    <li class="fit-item"><span class="fit-icon">✕</span><span>${n}</span></li>
  `).join('');

  document.getElementById('app').innerHTML = `
    <div class="container">

      <header class="page-header">
        <div class="eyebrow">AppySentinel · Client Overview</div>
        <h1>${d.title}</h1>
        <p class="subtitle">${d.subtitle}</p>
        <div class="intro-note">${d.intro}</div>
      </header>

      <div class="legend-row">${legend}</div>

      ${zones}

      <div>
        <div style="font-family:'Oswald',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.24em;text-transform:uppercase;color:var(--brand-muted);margin-top:48px;margin-bottom:0;">${d.fit_guide.heading}</div>
      </div>
      <div class="fit-section">
        <div class="fit-col good">
          <div class="fit-col-label">Good fit when…</div>
          <ul class="fit-list">${goodItems}</ul>
        </div>
        <div class="fit-col not">
          <div class="fit-col-label">Not the right tool when…</div>
          <ul class="fit-list">${notItems}</ul>
        </div>
      </div>

      <div class="page-footer">
        <div class="footer-note">
          appysentinel · client workspace · 2026-04-28 &nbsp;·&nbsp;
          <a class="footer-link" href="https://github.com/appydave/appysentinal" target="_blank">github.com/appydave/appysentinal</a>
        </div>
      </div>

    </div>
  `;
}
</script>
</body>
</html>
